<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevTrack - Track Your Coding Stats & Developer Growth</title>
    <meta name="description" content="DevTrack helps developers track their GitHub, LeetCode, CodeChef, HackerRank stats in one place. Analyze your coding growth and build a powerful developer profile." />
    <meta name="keywords" content="DevTrack, coding stats tracker, GitHub stats, LeetCode tracker, developer dashboard, coding profile, student developer tools" />
    <meta name="author" content="Ashutosh Mishra" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph (Facebook / LinkedIn) -->
    <meta property="og:title" content="DevTrack - All-in-One Developer Dashboard" />
    <meta property="og:description" content="Track all your coding stats (GitHub, LeetCode, CodeChef) in one place and boost your developer profile." />
    <meta property="og:image" content="/preview.png" />
    <meta property="og:url" content="https://devtrack.in" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DevTrack - Developer Growth Tracker" />
    <meta name="twitter:description" content="Track coding progress, GitHub activity & build your dev profile." />
    <meta name="twitter:image" content="/preview.png" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://devtrack.in" />

    <!-- Fonts (optional) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />

    <!-- Structured Data (SEO Boost 🔥) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "DevTrack",
        "url": "https://devtrack.in",
        "description": "Track GitHub, LeetCode, CodeChef and other coding stats in one place.",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "All",
        "author": {
          "@type": "Person",
          "name": "Ashutosh Mishra"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
